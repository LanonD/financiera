<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6f9;
    font-family:Arial, Helvetica, sans-serif;
}

form{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    width:300px;
    display:flex;
    flex-direction:column;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
    margin-top:10px;
}

input{
    padding:10px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
}

input:focus{
    outline:none;
    border:1px solid #3b82f6;
}

button{
    margin-top:20px;
    padding:10px;
    border:none;
    border-radius:5px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

</style>

</head>

<body>

<form method="POST" action="php/validacion.php">

<h2>Iniciar Sesión</h2>

<label>Usuario</label>
<input type="text" id="user" name="user" placeholder="Ingresa tu Usuario" required>

<label>Contraseña</label>
<input type="password" id="pwd" name="pwd" placeholder="Contraseña" required>

<button type="submit">Entrar</button>

</form>

</body>
</html>
